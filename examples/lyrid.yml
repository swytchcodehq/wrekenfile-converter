          name: request
          in: body
          required: true
          schema:
            type: array
            items:
              $ref: '#/definitions/model.ContinentPayload'
      responses:
        '200':
          description: returns array of object continent data
          schema:
            type: array
            items:
              type: array
              items:
                $ref: '#/definitions/model.ContinentTemplate'
        '400':
          description: Error
