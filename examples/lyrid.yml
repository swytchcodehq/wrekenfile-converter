    post:
      description: get string by ID
      produces:
        - application/json
      tags:
        - invite
      summary: Resends verification email to users
      parameters:
        - type: string
          description: With the bearer started
          name: Authorization
          in: header
          required: true
        - type: string
          description: the user id to authenticate with token that is already used
          name: id
          in: path
          required: true
      responses:
        '200':
          description: return if the email verification
          schema:
            type: boolean
  /pay/pricing/{countrycode}:
    get:
      description: List all pricing from a certain country that has specific payment gateway
      produces:
        - application/json
      tags:
        - Pricing
      summary: List pricing from country code
      parameters:
        - type: string
          description: With the bearer started
          name: Authorization
          in: header
          required: true
      responses:
        '200':
          description: return all pricing from country code
          schema:
            type: array
            items:
              $ref: '#/definitions/model.Pricing'
  /scripts/{jointoken}:
    get:
      description: Get vega installer script to be bash and curl to generate lyrid_sa_config and init.json
      produces:
        - text/plain
      tags:
        - Serverless
      summary: Get vega installer script url
      parameters:
        - type: string
          description: token to generates installer.sh
          name: jointoken
          in: path
          required: true
      responses:
        '200':
          description: Success
          schema:
            type: string
        '400':
          description: Join token is invalid
          schema:
            type: string
        '404':
          description: Installer script is not found
          schema:
            type: string
  /scripts/{jointoken}/off-boarding.sh:
    delete:
      description: Get vega offboarding script to be bash and curl to offboarding vega from cluster
      produces:
        - text/plain
      tags:
        - Serverless
      summary: Get vega offboarding script
      parameters:
        - type: string
          description: token to generates installer.sh
          name: jointoken
          in: path
          required: true
      responses:
        '200':
          description: Success
          schema:
            type: string
        '404':
          description: Off-Boarding script is not found
          schema:
            type: string
