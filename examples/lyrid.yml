      produces:
        - application/json
      tags:
        - Admin - Account
      summary: Update account tier of an account
      parameters:
        - type: string
          description: With the bearer started
          name: Authorization
          in: header
          required: true
        - description: request body to update account
          name: request
          in: body
          required: true
          schema:
            $ref: '#/definitions/lyra_model.Account'
      responses:
        '200':
          description: returns updated account
          schema:
            $ref: '#/definitions/lyra_model.Account'
        '400':
          description: User is not found
          schema:
            type: string
        '403':
          description: User has no privileged
          schema:
            type: string
  /admin/continent:
