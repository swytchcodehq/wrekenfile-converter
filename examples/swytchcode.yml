openapi: 3.0.3
info:
  title: Swytchcode API Docs
  version: 2.0.0
  description: OpeAPI documentation for Swytchcode API
components:
  schemas: {}
paths:
  /v2/app/authenticate:
    post:
      tags:
        - Account
      description: App email authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - firebaseId
                - accessToken
              properties:
                firebaseId:
                  type: string
                accessToken:
                  type: string
        required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscribed:
                    type: boolean
                  subsciptionName:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/register:
    post:
      tags:
        - Account
      description: App registration
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - firebaseId
                - accessToken
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                firebaseId:
                  type: string
                accessToken:
                  type: string
        required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscribed:
                    type: boolean
                  subsciptionName:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/logout:
    post:
      tags:
        - Account
      description: App logout
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
        required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/profiles/complete-profile:
    patch:
      tags:
        - Profile
      description: App profile completion
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                website:
                  type: string
                company:
                  type: string
                postition:
                  type: string
                isCompany:
                  type: boolean
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/projects:
    post:
      tags:
        - Project
      description: Create a new project
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - is_opensource
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                website_url:
                  type: string
                  nullable: true
                documentation_url:
                  type: string
                  nullable: true
                repository_url:
                  type: string
                  nullable: true
                is_opensource:
                  type: boolean
        required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    get:
      tags:
        - Project
      description: Get projects list
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    project_uuid:
                      type: string
                    name:
                      type: string
                    website_url:
                      type: string
                    documentation_url:
                      type: string
                    repository_url:
                      type: string
                    is_opensource:
                      type: boolean
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/projects/{project_uuid}:
    get:
      tags:
        - Project
      description: Get a project by UUID
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_uuid:
                    type: string
                  name:
                    type: string
                  website_url:
                    type: string
                  documentation_url:
                    type: string
                  repository_url:
                    type: string
                  is_opensource:
                    type: boolean
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      tags:
        - Project
      description: Delete a project
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/projects/{project_uuid}/mcp:
    patch:
      tags:
        - Project
      description: Enable/Disable MCP access of a project
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enable_mcp:
                  type: boolean
              required:
                - enable_mcp
        required: true
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/projects/{project_uuid}/re-submit:
    patch:
      tags:
        - Project
      description: Resubmit an opensource project for approval
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/projects/{project_uuid}/set-status:
    patch:
      tags:
        - Project
      description: Activate/Deactivate a project
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enable_project:
                  type: boolean
              required:
                - enable_project
        required: true
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/keys/{project_uuid}:
    post:
      tags:
        - Project key
      description: Create a new API key for a project (only one active at a time)
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_key_uuid:
                    type: string
                  project_uuid:
                    type: string
                  project_key:
                    type: string
                  is_active:
                    type: boolean
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    get:
      tags:
        - Project key
      description: Get the active API key for a project
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_key_uuid:
                    type: string
                  project_uuid:
                    type: string
                  project_key:
                    type: string
                  is_active:
                    type: boolean
                  created_date:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/keys/{project_key_uuid}:
    delete:
      tags:
        - Project key
      description: Delete (deactivate) a project API key
      parameters:
        - schema:
            type: string
          in: path
          name: project_key_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/projects/{project_uuid}/libraries:
    post:
      tags:
        - library
      description: Upload a new library file or provide a spec URL
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                version:
                  type: string
                library_group:
                  type: string
                programming_language:
                  type: string
                spec_type:
                  type: string
                  enum:
                    - openapi
                    - postman
                    - sdk
                file:
                  type: string
                  format: binary
                url:
                  type: string
                  format: uri
              required:
                - name
                - version
                - library_group
                - spec_type
              allOf:
                - if:
                    properties:
                      spec_type:
                        enum:
                          - sdk
                  then:
                    required:
                      - programming_language
                      - file
                - if:
                    properties:
                      spec_type:
                        enum:
                          - openapi
                          - postman
                  then:
                    anyOf:
                      - required:
                          - file
                      - required:
                          - url
        required: true
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    get:
      tags:
        - library
      description: List libraries for a project
      parameters:
        - schema:
            type: string
          in: path
          name: project_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /v2/app/libraries/{library_uuid}:
    get:
      tags:
        - library
      description: Get a library by UUID
      parameters:
        - schema:
            type: string
          in: path
          name: library_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      tags:
        - library
      description: Delete a library
      parameters:
        - schema:
            type: string
          in: path
          name: library_uuid
          required: true
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
servers:
  - url: http://localhost:3000
