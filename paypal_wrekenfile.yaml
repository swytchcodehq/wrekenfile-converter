VERSION: '1.2'
INIT:
  DEFAULTS:
    - bearer_token: BEARER <ACCESS_TOKEN>
    - w_base_url: https://api-m.sandbox.paypal.com
INTERFACES:
  invoices.create:
    SUMMARY: Create draft invoice
    DESCRIPTION: >-
      Creates a draft invoice. To move the invoice from a draft to payable
      state, you must <a href="#invoices_send">send the invoice</a>.<br/><br/>In
      the JSON request body, include invoice details including merchant
      information. The <code>invoice</code> object must include an
      <code>items</code> array.<blockquote><strong>Note:</strong> The merchant
      that you specify in an invoice must have a PayPal account in good
      standing.</blockquote>.
    DESC: Create draft invoice
    ENDPOINT: https://api-m.sandbox.paypal.com/v2/invoicing/invoices
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: STRUCT(invoice)
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: STRUCT(invoice)
        RETURNNAME: response
        CODE: '201'
      - RETURNTYPE: STRUCT(invoices.createResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(error_403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(invoices.createResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.list:
    SUMMARY: List invoices
    DESCRIPTION: >-
      Lists invoices. To filter the invoices that appear in the response, you
      can specify one or more optional query parameters.
    DESC: List invoices
    ENDPOINT: https://api-m.sandbox.paypal.com/v2/invoicing/invoices
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: RAW
    INPUTS:
      - name: page
        type: INT
        required: 'FALSE'
        location: QUERY
      - name: page_size
        type: INT
        required: 'FALSE'
        location: QUERY
      - name: total_required
        type: BOOL
        required: 'FALSE'
        location: QUERY
      - name: fields
        type: STRING
        required: 'FALSE'
        location: QUERY
    RETURNS:
      - RETURNTYPE: STRUCT(invoices)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(invoices.listResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(error_403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.send:
    SUMMARY: Send invoice
    DESCRIPTION: >-
      Sends or schedules an invoice, by ID, to be sent to a customer. The action
      depends on the invoice issue date:<ul><li>If the invoice issue date is
      current or in the past, sends the invoice immediately.</li><li>If the
      invoice issue date is in the future, schedules the invoice to be sent on
      that date.</li></ul>To suppress the merchant's email notification, set the
      `send_to_invoicer` body parameter to `false`. To send the invoice through
      a share link and not through PayPal, set the
      <code>send_to_recipient</code> parameter to <code>false</code> in the
      <code>notification</code> object. The <code>send_to_recipient</code>
      parameter does not apply to a future issue date because the invoice is
      scheduled to be sent through PayPal on that
      date.<blockquote><strong>Notes:</strong><ul><li>After you send an invoice,
      resending it has no effect.</li><li>To send a notification for updates, <a
      href="#invoices_update">update the invoice</a> and set the
      <code>send_to_recipient</code> body parameter to
      <code>true</code>.</li></ul></blockquote>
    DESC: Send invoice
    ENDPOINT: '`https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}/send`'
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: body
        type: STRUCT(notification)
        required: 'FALSE'
    RETURNS:
      - RETURNTYPE: STRUCT(link_description)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(202-response)
        RETURNNAME: response
        CODE: '202'
      - RETURNTYPE: STRUCT(error_400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(error_403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(error_422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.remind:
    SUMMARY: Send invoice reminder
    DESCRIPTION: >-
      Sends a reminder to the payer about an invoice, by ID. In the JSON request
      body, include a `notification` object that defines the subject of the
      reminder and other details.
    DESC: Send invoice reminder
    ENDPOINT: >-
      `https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}/remind`
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: body
        type: STRUCT(notification)
        required: 'FALSE'
    RETURNS:
      - RETURNTYPE: VOID
        RETURNNAME: response
        CODE: '204'
      - RETURNTYPE: STRUCT(invoices.remindResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(invoices.remindResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(invoices.remindResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.cancel:
    SUMMARY: Cancel sent invoice
    DESCRIPTION: >-
      Cancels a sent invoice, by ID, and, optionally, sends a notification about
      the cancellation to the payer, merchant, and CC: emails.
    DESC: Cancel sent invoice
    ENDPOINT: >-
      `https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}/cancel`
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: body
        type: STRUCT(notification)
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: VOID
        RETURNNAME: response
        CODE: '204'
      - RETURNTYPE: STRUCT(invoices.cancelResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(invoices.cancelResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(invoices.cancelResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.payments:
    SUMMARY: Record payment for invoice
    DESCRIPTION: >-
      Records a payment for the invoice. If no payment is due, the invoice is
      marked as `PAID`. Otherwise, the invoice is marked as `PARTIALLY PAID`.
    DESC: Record payment for invoice
    ENDPOINT: >-
      `https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}/payments`
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: body
        type: STRUCT(payment_detail)
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: STRUCT(payment_reference)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(invoices.paymentsResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(invoices.paymentsResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(invoices.paymentsResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.payments-delete:
    SUMMARY: Delete external payment
    DESCRIPTION: Deletes an external payment, by invoice ID and transaction ID.
    DESC: Delete external payment
    ENDPOINT: >-
      `https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}/payments/{transaction_id}`
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: DELETE
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: RAW
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: transaction_id
        type: STRING
        required: 'TRUE'
        location: PATH
    RETURNS:
      - RETURNTYPE: VOID
        RETURNNAME: response
        CODE: '204'
      - RETURNTYPE: STRUCT(invoices.payments-deleteResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(invoices.payments-deleteResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.refunds:
    SUMMARY: Record refund for invoice
    DESCRIPTION: >-
      Records a refund for the invoice. If all payments are refunded, the
      invoice is marked as `REFUNDED`. Otherwise, the invoice is marked as
      `PARTIALLY REFUNDED`.
    DESC: Record refund for invoice
    ENDPOINT: >-
      `https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}/refunds`
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: body
        type: STRUCT(refund_detail)
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: STRUCT(refund_reference)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(invoices.refundsResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(invoices.refundsResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(invoices.refundsResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.refunds-delete:
    SUMMARY: Delete external refund
    DESCRIPTION: Deletes an external refund, by invoice ID and transaction ID.
    DESC: Delete external refund
    ENDPOINT: >-
      `https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}/refunds/{transaction_id}`
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: DELETE
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: RAW
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: transaction_id
        type: STRING
        required: 'TRUE'
        location: PATH
    RETURNS:
      - RETURNTYPE: VOID
        RETURNNAME: response
        CODE: '204'
      - RETURNTYPE: STRUCT(invoices.refunds-deleteResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.generate-qr-code:
    SUMMARY: Generate QR code
    DESCRIPTION: >-
      Generates a QR code for an invoice, by ID. The QR code is a PNG image in
      <a href="https://www.base64encode.org/">Base64-encoded</a> format that
      corresponds to the invoice ID. You can generate a QR code for an invoice
      and add it to a paper or PDF invoice. When customers use their mobile
      devices to scan the QR code, they are redirected to the PayPal mobile
      payment flow where they can view the invoice and pay online with PayPal or
      a credit card. Before you get a QR code, you must <a
      href="#invoices_create">create an invoice</a> and <a
      href="#invoices_send">send an invoice</a> to move the invoice from a draft
      to payable state. Do not include an email address if you do not want the
      invoice emailed.
    DESC: Generate QR code
    ENDPOINT: >-
      `https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}/generate-qr-code`
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: body
        type: STRUCT(qr_config)
        required: 'FALSE'
    RETURNS:
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoicing.generate-next-invoice-number:
    SUMMARY: Generate invoice number
    DESCRIPTION: >-
      Generates the next invoice number that is available to the merchant. The
      next invoice number uses the prefix and suffix from the last invoice
      number and increments the number by one. For example, the next invoice
      number after `INVOICE-1234` is `INVOICE-1235`.
    DESC: Generate invoice number
    ENDPOINT: https://api-m.sandbox.paypal.com/v2/invoicing/generate-next-invoice-number
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: RAW
    INPUTS: []
    RETURNS:
      - RETURNTYPE: STRUCT(invoice_number)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(error_403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.get:
    SUMMARY: Show invoice details
    DESCRIPTION: Shows details for an invoice, by ID.
    DESC: Show invoice details
    ENDPOINT: '`https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}`'
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: RAW
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
    RETURNS:
      - RETURNTYPE: STRUCT(invoice)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(error_400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(invoices.getResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(error_422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.update:
    SUMMARY: Fully update invoice
    DESCRIPTION: >-
      Fully updates an invoice, by ID. In the JSON request body, include a
      complete `invoice` object. This call does not support partial updates.
    DESC: Fully update invoice
    ENDPOINT: '`https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}`'
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: PUT
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: send_to_recipient
        type: BOOL
        required: 'FALSE'
        location: QUERY
      - name: send_to_invoicer
        type: BOOL
        required: 'FALSE'
        location: QUERY
      - name: body
        type: STRUCT(invoice)
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: STRUCT(invoice)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(invoices.updateResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(invoices.updateResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(invoices.updateResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.delete:
    SUMMARY: Delete invoice
    DESCRIPTION: >-
      Deletes a draft or scheduled invoice, by ID. Deletes invoices in the draft
      or scheduled state only. For invoices that have already been sent, you can
      <a href="/docs/api/invoicing/v2/#invoices_cancel">cancel the invoice</a>.
      After you delete a draft or scheduled invoice, you can no longer use it or
      show its details. However, you can reuse its invoice number.
    DESC: Delete invoice
    ENDPOINT: '`https://api-m.sandbox.paypal.com/v2/invoicing/invoices/{invoice_id}`'
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: DELETE
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: RAW
    INPUTS:
      - name: invoice_id
        type: STRING
        required: 'TRUE'
        location: PATH
    RETURNS:
      - RETURNTYPE: VOID
        RETURNNAME: response
        CODE: '204'
      - RETURNTYPE: STRUCT(error_400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(invoices.deleteResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  invoices.search-invoices:
    SUMMARY: Search for invoices
    DESCRIPTION: >-
      Searches for and lists invoices that match search criteria. If you pass
      multiple criteria, the response lists invoices that match all criteria.
    DESC: Search for invoices
    ENDPOINT: https://api-m.sandbox.paypal.com/v2/invoicing/search-invoices
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: page
        type: INT
        required: 'FALSE'
        location: QUERY
      - name: page_size
        type: INT
        required: 'FALSE'
        location: QUERY
      - name: total_required
        type: BOOL
        required: 'FALSE'
        location: QUERY
      - name: body
        type: STRUCT(search_data)
        required: 'FALSE'
    RETURNS:
      - RETURNTYPE: STRUCT(invoices)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(invoices.search-invoicesResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(error_403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  templates.list:
    SUMMARY: List templates
    DESCRIPTION: >-
      Lists merchant-created templates with associated details. The associated
      details include the emails, addresses, and phone numbers from the user's
      PayPal profile.<br/>The user can select which values to show in the
      business information section of their template.
    DESC: List templates
    ENDPOINT: https://api-m.sandbox.paypal.com/v2/invoicing/templates
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: RAW
    INPUTS:
      - name: fields
        type: STRING
        required: 'FALSE'
        location: QUERY
      - name: page
        type: INT
        required: 'FALSE'
        location: QUERY
      - name: page_size
        type: INT
        required: 'FALSE'
        location: QUERY
    RETURNS:
      - RETURNTYPE: STRUCT(templates)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(templates.listResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(error_403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  templates.create:
    SUMMARY: Create template
    DESCRIPTION: >-
      Creates an invoice template. You can use details from this template to
      create an invoice. You can create up to 50
      templates.<blockquote><strong>Note:</strong> Every merchant starts with
      three PayPal system templates that are optimized for the unit type billed.
      The template includes `Quantity`, `Hours`, and `Amount`.</blockquote>
    DESC: Create template
    ENDPOINT: https://api-m.sandbox.paypal.com/v2/invoicing/templates
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: STRUCT(template)
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: STRUCT(template)
        RETURNNAME: response
        CODE: '201'
      - RETURNTYPE: STRUCT(templates.createResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(templates.createResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  templates.get:
    SUMMARY: Show template details
    DESCRIPTION: Shows details for a template, by ID.
    DESC: Show template details
    ENDPOINT: '`https://api-m.sandbox.paypal.com/v2/invoicing/templates/{template_id}`'
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: RAW
    INPUTS:
      - name: template_id
        type: STRING
        required: 'TRUE'
        location: PATH
    RETURNS:
      - RETURNTYPE: STRUCT(template)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(templates.getResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: ANY
        RETURNNAME: response
        CODE: '500'
  templates.update:
    SUMMARY: Fully update template
    DESCRIPTION: >-
      Fully updates a template, by ID. In the JSON request body, include a
      complete `template` object. This call does not support partial updates.
    DESC: Fully update template
    ENDPOINT: '`https://api-m.sandbox.paypal.com/v2/invoicing/templates/{template_id}`'
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: PUT
      HEADERS:
        - Content-Type: application/json
        - Authorization: bearer_token
      BODYTYPE: JSON
    INPUTS:
      - name: template_id
        type: STRING
        required: 'TRUE'
        location: PATH
      - name: body
        type: STRUCT(template)
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: STRUCT(template)
        RETURNNAME: response
        CODE: '200'
      - RETURNTYPE: STRUCT(templates.updateResponse400)
        RETURNNAME: response
        CODE: '400'
      - RETURNTYPE: STRUCT(templates.updateResponse403)
        RETURNNAME: response
        CODE: '403'
      - RETURNTYPE: STRUCT(error_404)
        RETURNNAME: response
        CODE: '404'
      - RETURNTYPE: STRUCT(templates.updateResponse422)
        RETURNNAME: response
        CODE: '422'
      - RETURNTYPE: ANY
