      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: currencies
        type: "STRING"
        required: 'TRUE'
        location: QUERY
      - name: endDate
        type: "STRING"
        required: 'TRUE'
        location: QUERY
      - name: fileType
        type: "STRING"
        required: 'TRUE'
        location: QUERY
      - name: startDate
        type: "STRING"
        required: 'TRUE'
        location: QUERY
    RETURNS:
  manage-customer-tags:
    SUMMARY: "Manage Customer Tags"
    DESC: "This API allows you to add, update, and delete customer tags."
    TAGS:
