        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-customer-tags-Response200)"
        RETURNNAME: response
        CODE: '200'
  accept-terms-and-conditions:
    SUMMARY: "Accept Terms and Conditions"
    DESC: "This API updates the Terms and Conditions acceptance status for a customer"
    TAGS:
      - "Customer Terms and Conditions"
    ENDPOINT: "/api/v1/client/customer/termsAndConditions"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-customer-termsAndConditions-Request)"
        required: 'TRUE'
    RETURNS:
  terms-and-conditions:
    SUMMARY: "Terms and Conditions"
    DESC: "This API allows you to fetch the mandatory Terms and Conditions for individual customer onboarding. Refer to the [T&C flow chart](/apis/docs/flow-diagrams#terms-and-conditions) for more details."
    TAGS:
      - "Customer Terms and Conditions"
    ENDPOINT: "/api/v1/client/termsAndConditions"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
