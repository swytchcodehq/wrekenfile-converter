VERSION: '1.2'
INIT:
  DEFAULTS:
    - w_base_url: https://api.default.com
INTERFACES:
  client-prefund-request:
    SUMMARY: "Client Prefund Request"
    DESC: "POST api/v1/client/prefund"
    TAGS:
      - "Client Prefund Account"
    ENDPOINT: "/api/v1/client/prefund"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-prefund-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-prefund-Response200)"
        RETURNNAME: response
        CODE: '200'
  client-fetch-prefund-request:
    SUMMARY: "Client Fetch Prefund Request"
    DESC: "GET api/v1/client/prefundList"
    TAGS:
      - "Client Prefund Account"
    ENDPOINT: "/api/v1/client/prefundList"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: amount
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: bankReferenceNumber
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: currency
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: startDate
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: endDate
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: order
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: page
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: size
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: prefundStatus
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: systemReferenceNumber
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: uniquePayerId
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: uniquePaymentId
        type: "STRING"
        required: 'FALSE'
        location: QUERY
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v1-client-prefundList-Response200)"
        RETURNNAME: response
        CODE: '200'
  client-prefund-balances:
    SUMMARY: "Client Prefund Balances"
    DESC: "GET api/v1/client/balances"
    TAGS:
      - "Client Prefund Account"
    ENDPOINT: "/api/v1/client/balances"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v1-client-balances-Response200)"
        RETURNNAME: response
        CODE: '200'
  client-details:
    SUMMARY: "Client Details"
    DESC: "GET api/v1/client"
    TAGS:
      - "Client Settings"
    ENDPOINT: "/api/v1/client"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v1-client-Response200)"
        RETURNNAME: response
        CODE: '200'
  client-fees:
    SUMMARY: "Client Fees"
    DESC: "GET api/v2/client/fees"
    TAGS:
      - "Client Settings"
    ENDPOINT: "/api/v2/client/fees"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v2-client-fees-Response200)"
        RETURNNAME: response
        CODE: '200'
  get-maximum-and-available-limits-of-direct-debit:
    SUMMARY: "Get Maximum And Available Limits Of Direct Debit"
    DESC: "GET api/v2/client/payin/limits"
    TAGS:
      - "Client Settings"
    ENDPOINT: "/api/v2/client/payin/limits"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v2-client-payin-limits-Response200)"
        RETURNNAME: response
        CODE: '200'
  client-transactions:
    SUMMARY: "Client Transactions"
    DESC: "GET api/v1/client/transactions"
    TAGS:
      - "Client"
    ENDPOINT: "/api/v1/client/transactions"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v1-client-transactions-Response200)"
        RETURNNAME: response
        CODE: '200'
  unified-add-customer:
    SUMMARY: "Unified Add Customer"
    DESC: "This API onboards customers based on their client configuration and preference.   >ℹ️ INFO   The 'childMustHaveParent' setting:   * can be optionally set to 'true' for Payroll and Spend and Management clients.   * should be set to 'false' for all other clients.   For details, see [Parent-child hierarchy](doc:parent-child-hierarchy)."
    TAGS:
      - "Customer Account - Individual"
    ENDPOINT: "/api/v4/client/customer"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v4-client-customer-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "ANY"
        RETURNNAME: response
        CODE: '200'
  customer-update:
    SUMMARY: "Customer Update"
    DESC: "This API allows you to update the customer details subject to the following constraints: 1. If compliance status equals to COMPLETED. You can only update email, mobile, delivery address details, and correspondence address details. You may NOT update the billing address. 2. In other cases, you may update any of the fields. At least one key-value pair is needed in the request body of this API."
    TAGS:
      - "Customer Account - Individual"
    ENDPOINT: "/api/v1/client/customer/updateCustomer"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-customer-updateCustomer-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-customer-updateCustomer-Response200)"
        RETURNNAME: response
        CODE: '200'
  fetch-individual-customer-rfi-details:
    SUMMARY: "Fetch Individual Customer RFI Details"
    DESC: "This API allows you to fetch details of RFI raised as part of Individual customer onboarding."
    TAGS:
      - "Customer Account - Individual"
    ENDPOINT: "/api/v1/client/customer/rfi"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v1-client-customer-rfi-Response200)"
        RETURNNAME: response
        CODE: '200'
  respond-to-rfi:
    SUMMARY: "Respond to RFI"
    DESC: "This API allows you to respond to an RFI raised by NIUM compliance team. You may use this API to respond to an RFI for data or documents when the customer's compliance status is RFI_REQUESTED."
    TAGS:
      - "Customer Account - Individual"
    ENDPOINT: "/api/v1/client/customer/rfi"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-customer-rfi-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-customer-rfi-Response200)"
        RETURNNAME: response
        CODE: '200'
  upload-document:
    SUMMARY: "Upload Document"
    DESC: "This API allows to upload documents necessary for customer onboarding. Refer to the RFI details on required documents."
    TAGS:
      - "Customer Account - Individual"
    ENDPOINT: "/api/v1/client/customer/uploadDocuments"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-customer-uploadDocuments-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-customer-uploadDocuments-Response200)"
        RETURNNAME: response
        CODE: '200'
  fetch-corporate-details:
    SUMMARY: "Fetch Corporate Details"
    DESC: "This API allows you to fetch both public and non-public exhaustive corporate details using business ID.  >ℹ️ INFO   >Every call for this API incurs a fee. Contact your Nium account manager to use it. This API only supports the corporate customer onboarding process. Avoid unnecessary API calls by using the throttling and debouncing techniques. This API should only be called after getting a successful response from [Public Corporate Details using Business ID API](/apis/reference/publiccorporatedetailsusingbusinessid)."
    TAGS:
      - "Customer Account - Corporate"
    ENDPOINT: "/api/v2/client/corporate/lookup"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: countryCode
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: searchReferenceId
        type: "STRING"
        required: 'FALSE'
        location: QUERY
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v2-client-corporate-lookup-Response200)"
        RETURNNAME: response
        CODE: '200'
  onboard-corporate-customer:
    SUMMARY: "Onboard Corporate Customer"
    DESC: "This API allows you to onboard a corporate customer under existing client."
    TAGS:
      - "Customer Account - Corporate"
    ENDPOINT: "/api/v1/client/corporate"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-corporate-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-corporate-Response200)"
        RETURNNAME: response
        CODE: '200'
  fetch-rfi-for-corporate-customer:
    SUMMARY: "Fetch RFI for Corporate Customer"
    DESC: "This API allows you to fetch details of RFI raised as part of corporate customer onboarding."
    TAGS:
      - "Customer Account - Corporate"
    ENDPOINT: "/api/v1/client/corporate/rfi?customerHashId="
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: caseId
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: customerHashId
        type: "STRING"
        required: 'TRUE'
        location: QUERY
      - name: region
        type: "STRING"
        required: 'FALSE'
        location: QUERY
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v1-client-corporate-rfi?customerHashId=-Response200)"
        RETURNNAME: response
        CODE: '200'
  respond-to-rfi-for-corporate-customer:
    SUMMARY: "Respond to RFI for Corporate Customer"
    DESC: "This API allows you to respond to an RFI raised for a corporate customer. You may use this API to respond to an RFI for data or documents when the corporate customer's compliance status is RFI_REQUESTED."
    TAGS:
      - "Customer Account - Corporate"
    ENDPOINT: "/api/v1/client/corporate/rfi"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-corporate-rfi-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-corporate-rfi-Response200)"
        RETURNNAME: response
        CODE: '200'
  upload-document-for-corporate-customer:
    SUMMARY: "Upload Document for Corporate Customer"
    DESC: "This API allows you to upload document for corporate customers."
    TAGS:
      - "Customer Account - Corporate"
    ENDPOINT: "/api/v1/client/customer/corporate/documents"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-customer-corporate-documents-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-customer-corporate-documents-Response200)"
        RETURNNAME: response
        CODE: '200'
  regenerate-kyc-url:
    SUMMARY: "Regenerate KYC URL"
    DESC: "This api will be used to regenerate kyc url"
    TAGS:
      - "Customer Account - Corporate"
    ENDPOINT: "/api/v1/client/customer/regenerateKYCURL"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-customer-regenerateKYCURL-Response200)"
        RETURNNAME: response
        CODE: '200'
  fetch-corporate-constants:
    SUMMARY: "Fetch corporate constants"
    DESC: "This API returns the acceptable values for the `category` query param to be used as input in the corporate onboarding flow. Refer to the [Fetch Corporate Constants](doc:fetch-corporate-constants-api) user guide for details on usage instructions on this API."
    TAGS:
      - "Customer Account - Corporate"
    ENDPOINT: "/api/v2/client/onboarding/constants?category=totalEmployees&region=AU&type=CORPORATE"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: category
        type: "STRING"
        required: 'TRUE'
        location: QUERY
      - name: region
        type: "STRING"
        required: 'TRUE'
        location: QUERY
      - name: type
        type: "STRING"
        required: 'TRUE'
        location: QUERY
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v2-client-onboarding-constants?category=totalEmployees&region=AU&type=CORPORATE-Response200)"
        RETURNNAME: response
        CODE: '200'
  update-corporate-customer:
    SUMMARY: "Update Corporate Customer"
    DESC: "This API allows you to update a corporate customer under existing client."
    TAGS:
      - "Customer Account - Corporate"
    ENDPOINT: "/api/v1/client/customer/corporate"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: POST
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS:
      - name: body
        type: "STRUCT(post-api-v1-client-customer-corporate-Request)"
        required: 'TRUE'
    RETURNS:
      - RETURNTYPE: "STRUCT(post-api-v1-client-customer-corporate-Response200)"
        RETURNNAME: response
        CODE: '200'
  customer-list-v3:
    SUMMARY: "Customer List V3"
