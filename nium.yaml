  fetch-application-details-:
    SUMMARY: "Fetch Application Details​"
    DESC: "This API allows Client to get the account details using the customer's consent Id for open banking, as part of the AIS flow."
    TAGS:
      - "Onboarding Forms - Corporate"
    ENDPOINT: "/api/v1/client/applications"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
