        required: 'FALSE'
        location: QUERY
      - name: tagKey
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: tagValue
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: order
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: page
        type: "STRING"
        required: 'FALSE'
        location: QUERY
      - name: size
        type: "STRING"
        required: 'FALSE'
        location: QUERY
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v3-client-customers-Response200)"
        RETURNNAME: response
        CODE: '200'
  customer-details-v2:
