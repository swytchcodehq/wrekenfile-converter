    DESC: "This API allows you to fetch details for a specific customer."
    TAGS:
      - "Customer Management"
    ENDPOINT: "/api/v2/client/customer"
    VISIBILITY: PUBLIC
    HTTP:
      METHOD: GET
      HEADERS:
        - Content-Type: application/json
      BODYTYPE: JSON
    INPUTS: []
    RETURNS:
      - RETURNTYPE: "STRUCT(get-api-v2-client-customer-Response200)"
        RETURNNAME: response
        CODE: '200'
  block-unblock-customer:
