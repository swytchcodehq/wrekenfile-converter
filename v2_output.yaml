VERSION: 2.0.2
DEFAULTS:
  w_base_url: https://api.petstore.com/v1
METHODS:
  petstoreapi.pet.list:
    SUMMARY: List all pets
    HTTP:
      METHOD: GET
      ENDPOINT: /pets
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: sync
    INPUTS:
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: "[]STRUCT(Pet)"
        RETURNVAR: petstoreapi_pet_list
        STATUS: 200
    CANONICAL_ID: petstoreapi.pet.list
  petstoreapi.pet.create:
    SUMMARY: Create a pet
    HTTP:
      METHOD: POST
      ENDPOINT: /pets
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(NewPet)
    EXECUTION:
      KIND: http
      MODE: sync
    INPUTS:
      - body:
          TYPE: STRUCT(NewPet)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Pet)
        RETURNVAR: petstoreapi_pet_create_201
        STATUS: 201
    CANONICAL_ID: petstoreapi.pet.create
  petstoreapi.pet.get:
    SUMMARY: Get a pet by ID
    HTTP:
      METHOD: GET
      ENDPOINT: /pets/{petId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: sync
    INPUTS:
      - petId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Pet)
        RETURNVAR: petstoreapi_pet_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Pet not found (HTTP 404)
    CANONICAL_ID: petstoreapi.pet.get
STRUCTS:
  Pet:
    - name: id
      type: INT
      REQUIRED: true
    - name: name
      type: STRING
      REQUIRED: true
    - name: tag
      type: STRING
      REQUIRED: false
  NewPet:
    - name: name
      type: STRING
      REQUIRED: true
    - name: tag
      type: STRING
      REQUIRED: false
