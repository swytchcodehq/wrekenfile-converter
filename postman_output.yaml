VERSION: 2.0.2
DEFAULTS:
  w_base_url: https://api.petstore.com/v1
METHODS:
  petstoreapi.pet.get:
    SUMMARY: Fetch pets
    HTTP:
      METHOD: GET
      ENDPOINT: /{baseUrl}/pets
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: sync
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - limit:
          TYPE: STRING
          LOCATION: query
      - Accept:
          TYPE: STRING
          LOCATION: header
    RETURNS:
      - RETURNTYPE: STRUCT(api.pet.listResponse200)
        RETURNVAR: petstoreapi_pet_get
        STATUS: 200
    CANONICAL_ID: petstoreapi.pet.get
  petstoreapi.pet.create:
    SUMMARY: Create pets
    HTTP:
      METHOD: POST
      ENDPOINT: /{baseUrl}/pets
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(api.pet.createRequest)
    EXECUTION:
      KIND: http
      MODE: sync
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(api.pet.createRequest)
          REQUIRED: true
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(api.pet.createResponse201)
        RETURNVAR: petstoreapi_pet_create_201
        STATUS: 201
    CANONICAL_ID: petstoreapi.pet.create
  petstoreapi.pet.get.1:
    SUMMARY: Fetch :petId
    HTTP:
      METHOD: GET
      ENDPOINT: /{baseUrl}/pets/:petId
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: sync
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          LOCATION: header
    RETURNS:
      - RETURNTYPE: STRUCT(api.pet.getResponse200)
        RETURNVAR: petstoreapi_pet_get_1
        STATUS: 200
    CANONICAL_ID: petstoreapi.pet.get.1
STRUCTS:
  api.pet.listResponse200:
    - name: id
      type: INT
      REQUIRED: false
    - name: name
      type: STRING
      REQUIRED: false
    - name: tag
      type: STRING
      REQUIRED: false
  api.pet.createRequest:
    - name: name
      type: STRING
      REQUIRED: false
    - name: tag
      type: STRING
      REQUIRED: false
  api.pet.createResponse201:
    - name: id
      type: INT
      REQUIRED: false
    - name: name
      type: STRING
      REQUIRED: false
    - name: tag
      type: STRING
      REQUIRED: false
  api.pet.getResponse200:
    - name: id
      type: INT
      REQUIRED: false
    - name: name
      type: STRING
      REQUIRED: false
    - name: tag
      type: STRING
      REQUIRED: false
