VERSION: 2.0.2
DEFAULTS:
  user-agent: <USER-AGENT>
  x-auth-key: <X-AUTH-KEY>
  x-auth-date: <X-AUTH-DATE>
  authorization: <AUTHORIZATION>
  w_base_url: https://api.podcastindex.org/api/1.0
METHODS:
  search.search.list:
    SUMMARY: Search
    DESC: |
      Replaces the Apple search API but returns data from the Podcast Index database.

      Note: No API key needed for this endpoint.

      Example:

        - Apple: https://itunes.apple.com/search?media=podcast&entity=podcast&term=batman
        - PodcastIndex: https://api.podcastindex.org/search?term=batman
    HTTP:
      METHOD: GET
      ENDPOINT: /search
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - term:
          TYPE: STRING
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: search.search.list
  lookup.lookup.list:
    SUMMARY: Lookup
    DESC: |
      Replaces the Apple podcast lookup API but returns data from the Podcast Index database.

      Note: No API key needed for this endpoint.

      Example:

        - Apple: https://itunes.apple.com/lookup?media=podcast&entity=podcast&id=1636765656
        - PodcastIndex: https://api.podcastindex.org/lookup?entity=podcast&id=1636765656
    HTTP:
      METHOD: GET
      ENDPOINT: /lookup
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: query
      - entity:
          TYPE: STRING
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: lookup.lookup.list
  search.byterm.list:
    SUMMARY: Search Podcasts
    DESC: |
      This call returns all of the feeds that match the search terms in the `title`, `author` or `owner` of the feed.

      Example: https://api.podcastindex.org/api/1.0/search/byterm?q=batman+university&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /search/byterm
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - q:
          TYPE: STRING
          LOCATION: query
      - val:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - max:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - aponly:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - clean:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - similar:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - fulltext:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: search.byterm.list
  search.bytitle.list:
    SUMMARY: Search Podcasts by Title
    DESC: |
      This call returns all of the feeds where the `title` of the feed matches the search term (ignores case).

      Example "everything everywhere daily" will match the podcast
      [Everything Everywhere Daily](https://podcastindex.org/podcast/437685) by "everything everywhere" will not.

      Example: https://api.podcastindex.org/api/1.0/search/bytitle?q=everything+everywhere+daily&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /search/bytitle
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - q:
          TYPE: STRING
          LOCATION: query
      - val:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - max:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - clean:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - fulltext:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - similar:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: search.bytitle.list
  search.byperson.list:
    SUMMARY: Search Episodes by Person
    DESC: |
      This call returns all of the episodes where the specified person is mentioned.

      It searches the following fields:

        - Person tags
        - Episode title
        - Episode description
        - Feed owner
        - Feed author

      Examples:

        - https://api.podcastindex.org/api/1.0/search/byperson?q=adam%20curry&pretty
        - https://api.podcastindex.org/api/1.0/search/byperson?q=Martin+Mouritzen&pretty
        - https://api.podcastindex.org/api/1.0/search/byperson?q=Klaus+Schwab&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /search/byperson
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - q:
          TYPE: STRING
          LOCATION: query
      - max:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - fulltext:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: search.byperson.list
  search.music.byterm.list:
    SUMMARY: Search Music Podcasts
    DESC: |
      This call returns all of the feeds that match the search terms in the `title`, `author` or `owner` of the <feed></feed>
      where the [medium](https://github.com/Podcastindex-org/podcast-namespace/blob/main/docs/1.0.md#medium) is `music`.

      Example: https://api.podcastindex.org/api/1.0/search/music/byterm?q=able+kirby&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /search/music/byterm
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - q:
          TYPE: STRING
          LOCATION: query
      - val:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - aponly:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - max:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - clean:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - fulltext:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: search.music.byterm.list
  podcasts.byfeedid.list:
    SUMMARY: By Feed ID
    DESC: |
      This call returns everything we know about the feed from the PodcastIndex ID

      Examples:

        - https://api.podcastindex.org/api/1.0/podcasts/byfeedid?id=75075&pretty
        - Includes `value` and `funding`: https://api.podcastindex.org/api/1.0/podcasts/byfeedid?id=169991&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /podcasts/byfeedid
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.byfeedid.list
  podcasts.byfeedurl.list:
    SUMMARY: By Feed URL
    DESC: |
      This call returns everything we know about the feed from the feed URL

      Examples:

        - https://api.podcastindex.org/api/1.0/podcasts/byfeedurl?url=https://feeds.theincomparable.com/batmanuniversity&pretty
        - Includes `value` and `funding`: https://api.podcastindex.org/api/1.0/podcasts/byfeedurl?url=https://engineered.network/pragmatic/feed/index.xml&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /podcasts/byfeedurl
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - url:
          TYPE: STRING
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.byfeedurl.list
  podcasts.byitunesid.list:
    SUMMARY: By iTunes ID
    DESC: |
      This call returns everything we know about the feed from the iTunes ID

      Example: https://api.podcastindex.org/api/1.0/podcasts/byitunesid?id=1441923632&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /podcasts/byitunesid
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.byitunesid.list
  podcasts.byguid.list:
    SUMMARY: By GUID
    DESC: |
      This call returns everything we know about the feed from the feed's GUID.

      The GUID is a unique, global identifier for the podcast. See the namespace spec for
      [guid](https://github.com/Podcastindex-org/podcast-namespace/blob/main/docs/1.0.md#guid) for details.

      Examples:

        - https://api.podcastindex.org/api/1.0/podcasts/byguid?guid=9b024349-ccf0-5f69-a609-6b82873eab3c&pretty
        - Includes `value` and `funding`: https://api.podcastindex.org/api/1.0/podcasts/byguid?guid=9b024349-ccf0-5f69-a609-6b82873eab3c&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /podcasts/byguid
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - guid:
          TYPE: STRING
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.byguid.list
  podcasts.bytag.list:
    SUMMARY: By Tag
    DESC: |
      This call returns all feeds that support the specified
      [podcast namespace](https://github.com/Podcastindex-org/podcast-namespace/blob/main/docs/1.0.md) tag.

      The only supported tags are:
        - `podcast:value` using the `podcast-value` parameter
        - `podcast:valueTimeSplit` using the `podcast-valueTimeSplit` parameter

      Only the `podcast-value` or `podcast-valueTimeSplit` parameter should be used. If multiple are specified, the
      first parameter is used and the others are ignored.

      When called without a `start_at` value, the top 500 feeds sorted by popularity are returned in descending order.

      When called with a `start_at` value, the feeds are returned sorted by the `feedId` starting with the specified value
      up to the max number of feeds to return. The `nextStartAt` specifies the value to pass to the next `start_at`.
      Repeat this sequence until no items are returned.

      Examples:
        - https://api.podcastindex.org/api/1.0/podcasts/bytag?podcast-value&max=200&pretty
        - https://api.podcastindex.org/api/1.0/podcasts/bytag?podcast-value&max=200&start_at=1&pretty
        - https://api.podcastindex.org/api/1.0/podcasts/bytag?podcast-valueTimeSplit&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /podcasts/bytag
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - podcast-value:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - podcast-valueTimeSplit:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - max:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - start_at:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.bytag.list
  podcasts.bymedium.list:
    SUMMARY: By Medium
    DESC: |
      This call returns all feeds marked with the specified
      [medium](https://github.com/Podcastindex-org/podcast-namespace/blob/main/docs/1.0.md#medium) tag value.

      Example: https://api.podcastindex.org/api/1.0/podcasts/bymedium?medium=music&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /podcasts/bymedium
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - medium:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - max:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.bymedium.list
  podcasts.trending.list:
    SUMMARY: Trending
    DESC: |
      This call returns the podcasts/feeds that in the index that are trending.

      Example: https://api.podcastindex.org/api/1.0/podcasts/trending?pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /podcasts/trending
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - max:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - since:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - lang:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - cat:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - notcat:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.trending.list
  podcasts.dead.list:
    SUMMARY: Dead
    DESC: |
      This call returns all feeds that have been marked dead (`dead` == 1)

      Hourly statistics can also be access at https://public.podcastindex.org/podcastindex_dead_feeds.csv
      For details, see [Dead Feeds](#get-/static/public/podcastindex_dead_feeds.csv).

      Example: https://api.podcastindex.org/api/1.0/podcasts/dead?pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /podcasts/dead
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.dead.list
  podcasts.batch.byguid.create:
    SUMMARY: Batch By Feed GUID
    DESC: |
      This call returns everything we know about the feed from the feed's GUID provided in JSON array in the body of the request.

      The GUID is a unique, global identifier for the podcast. See the namespace spec for
      [guid](https://github.com/Podcastindex-org/podcast-namespace/blob/main/docs/1.0.md#guid) for details.
    HTTP:
      METHOD: POST
      ENDPOINT: /podcasts/batch/byguid
      HEADERS:
        Content-Type: application/json
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: ANY
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: ANY
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: podcasts.batch.byguid.create
  episodes.byfeedid.list:
    SUMMARY: By Feed ID
    DESC: |
      This call returns all the episodes we know about for this feed from the PodcastIndex ID.
      Episodes are in reverse chronological order.

      When using the `enclosure` parameter, only the episode matching the URL is returned.

      Examples:

        - https://api.podcastindex.org/api/1.0/episodes/byfeedid?id=75075&pretty
        - https://api.podcastindex.org/api/1.0/episodes/byfeedid?id=41504,920666&pretty
        - https://api.podcastindex.org/api/1.0/episodes/byfeedid?id=75075&newest&pretty
        - https://api.podcastindex.org/api/1.0/episodes/byfeedid?id=41504,920666&newest&pretty
        - Includes `persons`: https://api.podcastindex.org/api/1.0/episodes/byfeedid?id=169991&pretty
        - Includes `value`: https://api.podcastindex.org/api/1.0/episodes/byfeedid?id=4058673&pretty
        - Using `enclosure`: https://api.podcastindex.org/api/1.0/episodes/byfeedid?id=41504&enclosure=https://op3.dev/e/mp3s.nashownotes.com/NA-1551-2023-04-30-Final.mp3&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /episodes/byfeedid
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: query
      - since:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - max:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - enclosure:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - fulltext:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - newest:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - pretty:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: episodes.byfeedid.list
  episodes.byfeedurl.list:
    SUMMARY: By Feed URL
    DESC: |
      This call returns all the episodes we know about for this feed from the feed URL.
      Episodes are in reverse chronological order.

      Examples:

        - https://api.podcastindex.org/api/1.0/episodes/byfeedurl?url=https://feeds.theincomparable.com/batmanuniversity&pretty
        - Includes `persons`: https://api.podcastindex.org/api/1.0/episodes/byfeedurl?url=https://engineered.network/pragmatic/feed/index.xml&pretty
        - Includes `value`: https://api.podcastindex.org/api/1.0/episodes/byfeedurl?url=https://closing-the-loop.github.io/feed.xml&pretty
    HTTP:
      METHOD: GET
      ENDPOINT: /episodes/byfeedurl
      HEADERS:
        X-Auth-Key: x-auth-key
        User-Agent: user-agent
        X-Auth-Date: x-auth-date
        Authorization: authorization
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - url:
          TYPE: STRING
          LOCATION: query
      - since:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
